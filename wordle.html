<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>Wordle (Mastermind)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <script>
        function initTheme() {
            const savedTheme = localStorage.getItem('theme_wordle_ultimate');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', savedTheme || (prefersDark ? 'dark' : 'light'));
        }
        initTheme();
        
        function toggleTheme() {
            const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme_wordle_ultimate', newTheme);
            document.querySelectorAll('.theme-toggle').forEach(el => el.innerText = newTheme === 'dark' ? '◑' : '◐');
        }
    </script>

    <style>
        :root {
            --bg-color: #FFFFFF; --text-color: #000000; --card-bg: #FFFFFF;
            --border-color: #E0E0E0; --shadow-color: rgba(0, 0, 0, 0.1);
            --empty-bg: #E0E0E0; --btn-bg: #FFFFFF; --control-bg: #F5F5F5; 
            --text-muted: #999999; --gold: #F5A623; --danger: #e74c3c; --primary: #00AA00;
            --primary-dark: #008800; --blue: #3498db; --blue-dark: #2980b9;
        }
        [data-theme="dark"] {
            --bg-color: #121212; --text-color: #E0E0E0; --card-bg: #1E1E1E;
            --border-color: #3A3A3A; --shadow-color: rgba(0, 0, 0, 0.5);
            --empty-bg: #444444; --btn-bg: #2C2C2C; --control-bg: #3A3A3A; 
            --text-muted: #888888;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: Consolas, "Courier New", monospace;
            -webkit-tap-highlight-color: transparent; overflow: hidden;
        }
        
        #app-container { width: 100%; max-width: 720px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; position: relative; }
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; overflow: hidden; }
        .screen.active { display: flex; }
        .hidden { display: none !important; }

        /* 顶部导航 */
        .header-bar { width: 100%; background-color: var(--primary); color: #FFF; user-select: none; display: flex; align-items: center; position: relative; flex-shrink: 0;}
        .header-home { justify-content: center; padding: 12px 0; }
        .header-game { justify-content: space-between; padding: 10px 15px; font-size: 16px; font-weight: bold; }
        
        .header-title { margin: 0; font-size: 28px; text-align: center; }
        .header-icon { position: absolute; font-size: 22px; cursor: pointer; transition: 0.2s; color: white; padding: 5px; }
        .header-icon:hover { opacity: 0.7; }
        .icon-left { left: 15px; } 
        
        .header-actions { position: absolute; right: 15px; display: flex; align-items: center; gap: 15px; }
        .header-actions a { color: white; display: flex; transition: opacity 0.2s; }
        .header-actions a:hover { opacity: 0.7; }
        .header-actions .theme-toggle { font-size: 22px; cursor: pointer; transition: 0.2s; }
        .header-actions .theme-toggle:hover { opacity: 0.7; }

        .header-game .icon-left { position: static; width: 30px; flex-shrink: 0; text-align: left; padding: 5px 0; }
        .header-game .header-actions { position: static; width: 30px; flex-shrink: 0; justify-content: flex-end; }
        
        #ui-game-title {
            display: flex; align-items: center; justify-content: center;
            flex: 1; min-width: 0; overflow: hidden; white-space: nowrap; padding: 0 10px; cursor: pointer;
        }
        .title-username {
            display: inline-block;
            max-width: 80px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; vertical-align: middle;
        }
        @media (min-width: 768px) { .title-username { max-width: 200px; } /* 电脑端放宽 */ }
        .player-tag {
            display: inline-block; padding: 1px 4px; border: 1px solid currentColor; border-radius: 3px;
            font-size: 10px; line-height: 1.2; margin-left: 4px; vertical-align: middle; flex-shrink: 0;
        }
        .title-mode { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 首页滚动区 */
        #home-scroll-area { flex: 1; overflow-y: auto; padding-bottom: 30px; }

        /* 卡片与按钮 */
        .box-card { border: 1px solid var(--border-color); background-color: var(--card-bg); box-shadow: 0 4px 6px var(--shadow-color); margin: 15px 10px; padding: 15px; border-radius: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .button-std { border: 1px solid var(--border-color); background-color: var(--btn-bg); color: var(--text-color); cursor: pointer; padding: 10px; border-radius: 5px; font-weight: bold; font-family: inherit; font-size: 14px; text-align: center; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .button-std:active { transform: scale(0.98); }
        .button-std:hover:not(:disabled) { border-color: var(--primary); }
        .button-primary { background-color: var(--primary); color: white; border-color: var(--primary); width: 100%; font-size: 16px; padding: 12px; flex-direction: row;}
        .button-primary:hover:not(:disabled) { background-color: var(--primary-dark); }
        .button-blue { background-color: var(--blue); color: white; border-color: var(--blue); width: 100%; font-size: 16px; padding: 12px; flex-direction: row; }
        .button-blue:hover:not(:disabled) { background-color: var(--blue-dark); }
        .button-danger { background-color: var(--danger); color: white; border-color: var(--danger); flex-direction: row; }
        .button-gold { background-color: var(--gold); color: #000; border-color: var(--gold); flex-direction: row; }
        button:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(100%); }

        /* 输入与设置区域 */
        .setting-row { display: flex; align-items: center; margin-bottom: 12px; gap: 8px; flex-wrap: wrap; }
        input[type="text"], input[type="number"] { padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color); font-family: inherit; flex: 1; min-width: 60px;}
        input[type="range"] { flex: 1; cursor: pointer; accent-color: var(--primary); }
        .dice-btn { cursor: pointer; font-size: 20px; background: none; border: none; padding: 0 5px; line-height: 1; }
        .score-badge { font-size: 12px; background: var(--control-bg); padding: 4px 8px; border-radius: 4px; font-weight:bold; white-space: nowrap; cursor: pointer; border:1px solid var(--border-color);}
        
        .toggle-group { display: flex; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; flex: 1; min-width: 150px;}
        .toggle-btn { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; background: var(--btn-bg); transition: 0.2s; }
        .toggle-btn.active { background: var(--primary); color: white; }
        
        .custom-param-box { display: flex; gap: 10px; background: var(--control-bg); padding: 10px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; font-weight: bold; align-items: center; flex-wrap: wrap; justify-content: center;}

        /* 游戏专属布局 */
        .game-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; margin: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); box-shadow: 0 4px 6px var(--shadow-color); }
        .game-header-info { padding: 10px 15px; border-bottom: 1px dashed var(--border-color); display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; flex-shrink: 0;}
        #guess-container { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth;}
        .keyboard-wrapper { flex-shrink: 0; padding: 15px 10px; border-top: 1px solid var(--border-color); background: var(--card-bg); }

        .guess-card { border: 1px solid var(--border-color); background-color: var(--card-bg); box-shadow: 0 2px 4px var(--shadow-color); margin: 6px auto; padding: 8px; width: min-content; white-space: nowrap; border-radius: 8px; display: flex; }
        .guess-card-current { border-color: #00AAFF; box-shadow: 0 0 8px rgba(0, 170, 255, 0.4); }
        .color-block { width: 32px; height: 32px; margin: 0 4px; display: inline-block; background-color: var(--empty-bg); border-radius: 4px; transition: background-color 0.2s, transform 0.1s, opacity 0.2s; }
        .color-under { width: 32px; height: 6px; margin: 0 4px; display: inline-block; border-radius: 3px; background-color: var(--empty-bg); transition: 0.2s;}
        .color-dot { width: 6px; height: 6px; display: inline-block; border-radius: 3px; background-color: var(--empty-bg); margin: 2px; }
        .container-color-block { display: flex; align-items: center; justify-content: center; }

        .dot0 { margin-top: 8px; margin-left: 8px; }
        .dot1 { margin-top: 8px; margin-left: 8px; }
        .dot2 { margin-top: 22px; margin-left: -20px; }
        .dot3 { margin-top: 22px; margin-left: 8px; }

        .control-btn { background-color: var(--control-bg); color: var(--text-color); line-height: 32px; text-align: center; font-size: 20px; cursor: pointer; user-select: none; }
        .keyboard-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        
        .key-hint { position: absolute; font-size: 10px; color: rgba(255,255,255,0.7); bottom: 2px; right: 4px; font-weight: bold; pointer-events: none;}
        
        @media (max-width: 768px) { 
            .color-block {width: 28px; height: 28px;} .color-under{width: 28px;} .control-btn {line-height: 28px;} 
            .game-panel { margin: 5px; } .keyboard-wrapper { padding-bottom: 20px; }
            .key-hint { display: none; }
        }

        /* 模态框与组件 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(2px);}
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 8px; width: 92%; max-width: 480px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-content h2 { margin-top: 0; text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;}
        
        details { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 5px; margin-bottom: 15px; padding: 5px 10px; }
        summary { cursor: pointer; font-weight: bold; outline: none; padding: 5px 0; color: var(--primary); }
        .emoji-content { white-space: pre-wrap; font-size: 14px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-color); line-height: 1.5; }

        .store-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid var(--border-color); margin-bottom: 10px; border-radius: 8px; background: var(--bg-color); }
        
        .heatmap-row { display: flex; align-items: center; font-size: 12px; margin: 4px 0; }
        .heatmap-bar { background: var(--primary); height: 16px; min-width: 5px; margin-left: 8px; border-radius: 2px; text-align: right; color: white; font-size: 10px; padding-right: 4px; line-height: 16px;}

        /* 特效动画 */
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }
        .anim-pop { animation: pop 0.2s ease-out forwards; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 20%, 60% {transform: translateX(-5px);} 40%, 80% {transform: translateX(5px);} }
        .anim-shake { animation: shake 0.4s ease-in-out forwards; border-color: var(--danger) !important; box-shadow: 0 0 5px var(--danger) !important; }
        
        @keyframes timerShake { 0%, 100% {transform: translateX(0); color: var(--danger);} 25% {transform: translateX(-5px); color: var(--danger);} 75% {transform: translateX(5px); color: var(--danger);} }
        .timer-penalty { animation: timerShake 0.4s forwards; }

        @keyframes floatUpFade { 0% { opacity: 1; top: 0px; } 100% { opacity: 0; top: -30px; } }
        .floating-text { position: absolute; left: 50%; top: -10px; transform: translateX(-50%); font-size: 16px; font-weight: bold; pointer-events: none; animation: floatUpFade 1s ease-out forwards; text-shadow: 0 1px 2px rgba(0,0,0,0.5); z-index: 10;}

        #fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; }
        
        @keyframes hint-flash { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        .hint-flash { animation: hint-flash 0.5s; }
    </style>
</head>
<body>
<canvas id="fireworks"></canvas>
<div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content" id="modal-content"></div>
</div>

<div id="app-container">

    <!-- ================= 开屏页 ================= -->
    <div id="screen-home" class="screen active">
        <div class="header-bar header-home">
            <div class="header-icon icon-left" onclick="UI.showRules()" title="规则说明">ℹ️</div>
            <h1 class="header-title">WORDLE</h1>
            <div class="header-actions">
                <a href="https://github.com/MeiVinEight/Wordle" target="_blank" title="GitHub 仓库 - 作者 MeiVinEight">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                </a>
                <div class="theme-toggle" onclick="toggleTheme()" title="切换深浅色">◐</div>
            </div>
        </div>
        
        <div id="home-scroll-area">
            <div class="box-card">
                <!-- 玩家设置区 -->
                <div class="setting-row">
                    <span style="font-weight:bold; font-size:14px; width:45px;" id="label-p1">玩家</span>
                    <input type="text" id="input-p1-name" maxlength="10" placeholder="昵称">
                    <button class="dice-btn" onclick="App.randomName('p1')" title="随机">🎲</button>
                    <div class="score-badge" onclick="UI.showStats('p1')">统计</div>
                </div>
                
                <div class="setting-row" style="margin: 15px 0;">
                    <span style="font-size:14px; font-weight:bold; width:45px;">玩家数</span>
                    <div class="toggle-group">
                        <div class="toggle-btn active" id="mode-1p" onclick="App.setPlayMode(1)">孤军奋战</div>
                        <div class="toggle-btn" id="mode-2p" onclick="App.setPlayMode(2)">双人成行</div>
                    </div>
                </div>

                <div class="setting-row hidden" id="row-p2">
                    <span style="font-weight:bold; font-size:14px; width:45px;">P2</span>
                    <input type="text" id="input-p2-name" maxlength="10" placeholder="P2昵称">
                    <button class="dice-btn" onclick="App.randomName('p2')" title="随机">🎲</button>
                    <div class="score-badge" onclick="UI.showStats('p2')">统计</div>
                </div>

                <!-- 滑杆控制区 -->
                <div class="setting-row">
                    <span style="font-size:14px; font-weight:bold; width:45px;">模式</span>
                    <div class="toggle-group">
                        <div class="toggle-btn active" id="hint-easy" onclick="App.setHintType('easy')">Easy</div>
                        <div class="toggle-btn" id="hint-hard" onclick="App.setHintType('hard')">Hard</div>
                    </div>
                </div>
                <div class="setting-row">
                    <span style="font-size:14px; font-weight:bold; width:45px;">难度</span>
                    <input type="range" id="slider-diff" min="0" max="4" step="1" value="1" oninput="App.updateDiffLabel()">
                </div>
                <div style="text-align:center; color:var(--danger); font-size:13px; margin-bottom:10px; font-weight:bold;" id="label-diff"></div>
                
                <!-- 自定义参数 -->
                <div class="custom-param-box hidden" id="custom-params">
                    颜色: <input type="number" id="cus-colors" min="4" max="9" value="8" style="width:45px; padding:4px;"> 
                    槽位: <input type="number" id="cus-slots" min="3" max="8" value="4" style="width:45px; padding:4px;"> 
                    步数: <input type="number" id="cus-guesses" min="5" max="99" value="10" style="width:45px; padding:4px;">
                </div>

                <div class="setting-row" style="justify-content: center; font-size:13px;">
                    <label style="cursor:pointer; user-select:none; font-weight:bold;">
                        <input type="checkbox" id="check-repeat" style="vertical-align:middle;"> 重复色模式
                    </label>
                </div>

                <hr style="border:0; border-top:1px dashed var(--border-color); margin:15px 0;" />

                <!-- 开始游戏按钮群 -->
                <div class="btn-grid">
                    <button class="button-std" id="btn-classic" style="border-color:var(--primary); color:var(--primary);" onclick="App.openClassicModal()">
                        闯关模式<br><span style="font-size:10px;font-weight:normal;">进度: 第 <span id="ui-level">1</span> 关</span>
                    </button>
                    <button class="button-std" id="btn-daily" onclick="App.startGame('daily')">
                        每日挑战<br><span style="font-size:10px;font-weight:normal;">与全球玩家解谜</span>
                    </button>
                    <button class="button-std" id="btn-challenge" onclick="App.startGame('challenge')">
                        挑战模式<br><span style="font-size:10px;font-weight:normal;">步步为营</span>
                    </button>
                    <button class="button-std" id="btn-speedrun" onclick="App.startGame('speedrun')">
                        竞速模式<br><span style="font-size:10px;font-weight:normal;">奖罚机制</span>
                    </button>
                    <button class="button-std" id="btn-casual" style="grid-column: span 2;" onclick="App.startGame('casual')">
                        休闲模式<br><span style="font-size:10px;font-weight:normal;">自由探索</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 局内对战页 ================= -->
    <div id="screen-game" class="screen">
        <div class="header-bar header-game">
            <span class="header-icon icon-left" onclick="UI.requestHome()">←</span>
            <div id="ui-game-title" onclick="Game.cheatClick()"></div>
            <div class="header-actions">
                <span class="theme-toggle" onclick="toggleTheme()">◐</span>
            </div>
        </div>

        <div class="game-panel">
            <div class="game-header-info">
                <div style="position:relative;" id="timer-wrapper">
                    <span id="ui-timer" style="color:var(--text-color);">⏱ --:--</span>
                </div>
                <span id="ui-guesses">👟 ∞</span>
                <div>
                    <button class="button-std" style="background-color:var(--danger);color:white;padding:4px 8px; font-size:12px; display:inline;" onclick="App.resetGame()">重玩</button>
                    <button class="button-std" style="background-color:var(--gold);color:#000;padding:4px 8px; font-size:12px; display:inline;" onclick="UI.openStore()">商店</button>
                </div>
            </div>

            <div id="guess-container"></div>
            
            <div class="keyboard-wrapper">
                <div class="keyboard-area" id="keyboard"></div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('keydown', (e) => {
        if (Game.state && Game.state.active) {
            if (e.key === 'Backspace') { e.preventDefault(); Game.inputBackspace(); }
            else if (e.key === 'Enter') { e.preventDefault(); Game.inputSubmit(); }
            else if (e.key >= '1' && e.key <= '9') {
                let idx = parseInt(e.key) - 1;
                if (idx < Game.config.c) Game.inputColor(idx);
            }
        } else if (App.vsSetupActive) {
            if (e.key === 'Backspace') { e.preventDefault(); window.vsBk(); }
            else if (e.key === 'Enter') { e.preventDefault(); window.vsSub(); }
            else if (e.key >= '1' && e.key <= '9') {
                let idx = parseInt(e.key) - 1;
                if (idx < App.vsCfg.c) window.vsAdd(idx);
            }
        }
    });

    window.addEventListener('beforeunload', (e) => {
        if ((Game.state && Game.state.active) || App.vsSetupActive) {
            e.preventDefault();
            e.returnValue = '当前仍在游戏环节中，刷新或离开将丢失进度，确定要离开吗？';
            return e.returnValue;
        }
    });

    // --- 音效引擎 ---
    const AudioEngine = {
        ctx: null,
        init() {
            if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        playTone(freq, type, duration, vol=0.1) {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + duration);
        },
        playClick() { this.playTone(800, 'sine', 0.08, 0.05); },
        playBackspace() { this.playTone(300, 'square', 0.1, 0.05); },
        playError() { this.playTone(150, 'sawtooth', 0.2, 0.1); },
        playSuccess() { this.playTone(523.25, 'square', 0.1, 0.1); setTimeout(()=>this.playTone(783.99, 'square', 0.2, 0.1), 100); },
        playLose() { this.playTone(300, 'sawtooth', 0.4, 0.1); },
        async playMorseCode(answerArray) {
            const morseMap = [".----", "..---", "...--", "....-", ".....", "-....", "--...", "---..", "----."];
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            for (let idx of answerArray) {
                let code = morseMap[idx];
                for (let char of code) {
                    let dur = char === '.' ? 0.08 : 0.24;
                    this.playTone(600, 'square', dur, 0.1);
                    await sleep(dur * 1000 + 50);
                }
                await sleep(300);
            }
        }
    };
    document.body.addEventListener('pointerdown', () => AudioEngine.init(), { once: true });

    // --- 烟花动画系统 ---
    let fwCanvas, fwCtx, particles =[], fwActive = false, fwTimer = null;
    function startFireworks() {
        fwCanvas = document.getElementById('fireworks'); fwCtx = fwCanvas.getContext('2d');
        fwCanvas.width = window.innerWidth; fwCanvas.height = window.innerHeight;
        fwCanvas.style.display = 'block'; fwActive = true; animateFireworks();
        clearTimeout(fwTimer);
        fwTimer = setTimeout(stopFireworks, 5000);
    }
    function stopFireworks() { fwActive = false; if (fwCanvas) { fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height); particles =[]; fwCanvas.style.display = 'none'; } }
    function animateFireworks() {
        if (!fwActive) return; requestAnimationFrame(animateFireworks);
        fwCtx.globalCompositeOperation = 'destination-out'; fwCtx.fillStyle = 'rgba(0,0,0,0.1)'; fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
        fwCtx.globalCompositeOperation = 'lighter';
        if (Math.random() < 0.1) {
            const x = Math.random() * fwCanvas.width; const y = Math.random() * fwCanvas.height * 0.5;
            const c = COLORS[Math.floor(Math.random() * COLORS.length)];
            for (let i = 0; i < 40; i++) {
                const a = Math.random() * Math.PI * 2; const s = Math.random() * 5 + 1;
                particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: Math.random()*30+30, color: c, size: Math.random()*3+1 });
            }
        }
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
            fwCtx.fillStyle = p.color; fwCtx.beginPath(); fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); fwCtx.fill();
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    // --- PRNG ---
    function seededRandom(seed) {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    }

    function escapeHTML(str) {
        if (!str) return '';
        return String(str).replace(/[&<>'"]/g, match => {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
            return map[match];
        });
    }

    // --- 数据模型 ---
    const COLORS = ["#AA0000", "#00AA00", "#0000AA", "#FFAA00", "#AA00AA", "#FF00AA", "#00AAAA", "#00AAFF", "#556B2F"];

        { name: "简单", c: 6, s: 4, g: 10 }, { name: "标准", c: 8, s: 4, g: 10 },

    ];

    const INFINITE_GUESSES = 9999;

        hint:  { name: '排除一项',   cost: 50,  penalty: 0.3, color: '', val: 0 },
        time:  { name: '增加时长(+30s)',     cost: 30,  penalty: 0.2, color: '', val: 30 },

    };

        load() { let d = localStorage.getItem('mm_data_full_v2'); if(d) Object.assign(this, JSON.parse(d)); },
        save() { localStorage.setItem('mm_data_full_v2', JSON.stringify(this)); }
    };

    // --- Knuth's Minimax Algorithm ---
    const AI = {
        calculateHint(guess, answer) {
            let greens = 0, oranges = 0;
            let ansCopy = [...answer], guessCopy = [...guess];
            for (let i = 0; i < guess.length; i++) {
                if (guessCopy[i] === ansCopy[i]) { greens++; ansCopy[i] = -1; guessCopy[i] = -2; }
            }
            for (let i = 0; i < guess.length; i++) {
                if (guessCopy[i] >= 0) {
                    let idx = ansCopy.indexOf(guessCopy[i]);
                    if (idx !== -1) { oranges++; ansCopy[idx] = -1; }
                }
            }
            return { greens, oranges };
        },

        findBestGuess(history, config) {
            let allPermutations =[];
            function generate(prefix, elements) {
                if (prefix.length === config.s) {
                    allPermutations.push(prefix); return;
                }
                for (let i = 0; i < elements.length; i++) {
                    let newPrefix = prefix.concat(elements[i]);
                    let newElements = [...elements];
                    if (!config.repeat) newElements.splice(i, 1);
                    generate(newPrefix, newElements);
                }
            }
            generate([], Array.from({length: config.c}, (_,i)=>i));
            
            let possibleSolutions = allPermutations.filter(solution => {
                return history.every(pastGuess => {
                    const hint = this.calculateHint(pastGuess.colors, solution);
                    return hint.greens === pastGuess.greens && hint.oranges === pastGuess.oranges;
                });
            });

            if (possibleSolutions.length <= 1) return possibleSolutions[0] || null;

            let bestGuess = null, minMaxPartition = Infinity;
            for (const guess of allPermutations) {
                const partitions = {}; 
                for (const solution of possibleSolutions) {
                    const hint = this.calculateHint(guess, solution);
                    const key = `${hint.greens},${hint.oranges}`;
                    partitions[key] = (partitions[key] || 0) + 1;
                }
                const maxPartition = Math.max(...Object.values(partitions));
                if (maxPartition < minMaxPartition) {
                    minMaxPartition = maxPartition;
                    bestGuess = guess;
                }
            }
            return bestGuess;
        }
    };

        randomName(p) {
            const names = ["暗影刺客", "白昼法师", "量子飞客", "孤狼猎手", "狂战士", "代码诗人"];

        },
        getGameConfig() {

            let c, s, g;
            if(diffVal === 4) {
                c = Math.max(4, Math.min(9, parseInt(document.getElementById('cus-colors').value)));
                s = Math.max(3, Math.min(8, parseInt(document.getElementById('cus-slots').value)));
                g = Math.max(5, Math.min(99, parseInt(document.getElementById('cus-guesses').value)));
            } else {
                c = DIFF_LEVELS[diffVal].c; s = DIFF_LEVELS[diffVal].s; g = DIFF_LEVELS[diffVal].g;
            }
            return { c, s, g };
        },
        openClassicModal() {
            let maxLvl = UserData.p1.classicLevel;
            let html = `

                    <div style="display:flex; justify-content:center; align-items:center; gap:10px;">

        startGame(mode, classicLvl = null) {
            let {c, s, g} = this.getGameConfig();
            let cfg = { 
                mode: mode, 
                is2P: this.playMode === 2 && (mode === 'challenge' || mode === 'casual'),
                c: c, s: s, g: g, 
                hintType: this.hintType, repeat: document.getElementById('check-repeat').checked, t: 180
            };

            if (mode === 'classic') {
                cfg.is2P = false; cfg.repeat = false;
                cfg.classicLevel = classicLvl || UserData.p1.classicLevel;
                Game.start(cfg);
            } 
            else if (mode === 'daily') {
                let today = new Date().toISOString().slice(0,10);
                if (UserData.dailyPlayed === today) return alert("今日挑战已完成，请明天再来！");
                cfg.is2P = false; 
                let seedStr = today.replace(/-/g, '') + cfg.c + cfg.s + (cfg.repeat?1:0);
                let seed = parseInt(seedStr);
                Game.start(cfg, Game.generateAnswer(cfg, seed));
            }
            else if (mode === 'challenge') {
                if(cfg.is2P) UI.show2PSetupPrompt(cfg); else Game.start(cfg);
            }
            else if (mode === 'speedrun') {
                cfg.is2P = false; cfg.g = INFINITE_GUESSES;
                Game.start(cfg, null, 0); 
            }
            else if (mode === 'casual') {
                cfg.t = 0; cfg.g = INFINITE_GUESSES; 
                if(cfg.is2P) UI.show2PSetupPrompt(cfg); else Game.start(cfg);
            }
        },
        resetGame() {
            if(Game.config.is2P) UI.show2PSetupPrompt(Game.config);
            else if(Game.config.mode === 'classic') {
                this.startGame('classic', Game.config.classicLevel);
            }
            else if(Game.config.mode === 'daily') {
                alert("你已经完成今日挑战啦，请明天再来");
                UI.showHome();
            }
            else Game.start(Game.config, null, Game.config.mode === 'speedrun' ? 0 : null);
        }

    // --- 游戏核心逻辑 ---
    const Game = {
        config: {},
        state: { active: false, answer:[], guesses:[], currentInput:[], timeLeft: 0, timerId: null, disabledColors:[], itemsUsed:{}, cheatClicks:0, speedrunWins:0 },

        start(cfg, customAnswer = null, speedrunWins = 0) {
            this.config = cfg;
            if (this.state && this.state.timerId) clearInterval(this.state.timerId);
            
            let initialItemsUsed = Object.keys(ITEMS_CFG).reduce((acc, key) => { acc[key] = false; return acc; }, {});

            this.state = {
                active: true, cheatClicks: 0, speedrunWins: speedrunWins,
                answer: customAnswer || this.generateAnswer(this.config),
                guesses:[], currentInput:[], timeLeft: this.config.t, 
                disabledColors:[], itemsUsed: initialItemsUsed
            };
            
            UI.showGameScreen();
            this.startTimer();

            if (this.config.mode === 'classic' && this.config.classicLevel >= 5 && this.config.classicLevel % 5 === 0 && this.config.hintType === 'hard') {
                setTimeout(() => {
                    for (let i = 0; i < this.config.s; i++) {
                        let available = Array.from({length: this.config.c}, (_, idx) => idx);
                        this.state.currentInput.push(available[Math.floor(Math.random() * available.length)]);
                    }
                    this.inputSubmit(true);
                }, 500);
            }
        },

        generateAnswer(cfg, seed = null) {
            let ans =[]; let available = Array.from({length: cfg.c}, (_, i) => i);
            let currentSeed = seed;
            for (let i = 0; i < cfg.s; i++) {
                let r;
                if (currentSeed !== null) {
                    r = Math.floor(seededRandom(currentSeed) * available.length);
                    currentSeed++;
                } else {
                    r = Math.floor(Math.random() * available.length);
                }
                ans.push(available[r]); 
                if (!cfg.repeat) available.splice(r, 1);
            }
            return ans;
        },

        startTimer() {
            clearInterval(this.state.timerId); UI.renderHeaderState();
            if (this.config.t === 0) return;
            this.state.timerId = setInterval(() => {
                if (!this.state.active) return clearInterval(this.state.timerId);
                this.state.timeLeft--; UI.renderHeaderState();
                if (this.state.timeLeft <= 0) this.endGame(false, "Time Limit Exceed！");
            }, 1000);
        },

        inputColor(cIdx) {
            if (!this.state.active || this.state.currentInput.length >= this.config.s) return;
            if (this.state.disabledColors.includes(cIdx)) return;
            if (!this.config.repeat && this.state.currentInput.includes(cIdx)) {
                let el = document.getElementById('key-'+cIdx);
                el.classList.remove('anim-shake'); void el.offsetWidth; el.classList.add('anim-shake');
                setTimeout(() => el.classList.remove('anim-shake'), 400);
                return;
            }
            AudioEngine.playClick();
            this.state.currentInput.push(cIdx); UI.renderBoard();
        },

        inputBackspace() {
            if (!this.state.active || this.state.currentInput.length === 0) return;
            AudioEngine.playBackspace(); this.state.currentInput.pop(); UI.renderBoard();
        },

        inputSubmit(silent = false) {
            if (!this.state.active || this.state.currentInput.length < this.config.s) return;

            let greens = 0, oranges = 0;
            let ansCopy = [...this.state.answer], guessCopy = [...this.state.currentInput];
            let posDetail = Array(this.config.s).fill(0);

            for (let i = 0; i < this.config.s; i++) {
                if (guessCopy[i] === ansCopy[i]) { greens++; ansCopy[i] = -1; guessCopy[i] = -2; posDetail[i] = 1; }
            }
            for (let i = 0; i < this.config.s; i++) {
                if (guessCopy[i] >= 0) {
                    let idx = ansCopy.indexOf(guessCopy[i]);
                    if (idx !== -1) { oranges++; ansCopy[idx] = -1; posDetail[i] = 2; }
                }
            }

            this.state.guesses.push({ colors: [...this.state.currentInput], greens, oranges, posDetail });
            this.state.currentInput =[];
            UI.renderBoard(); UI.renderHeaderState();

            let rowId = 'history-row-' + (this.state.guesses.length - 1);

            if (this.config.mode === 'speedrun') {
                if (greens === this.config.s) {
                    this.state.timeLeft += 30; this.state.speedrunWins++;
                    UI.showFloatingText("+30s", "var(--primary)"); AudioEngine.playSuccess();
                    this.state.answer = this.generateAnswer(this.config); this.state.guesses =[];
                    UI.renderBoard(); UI.renderHeaderState();
                } else {
                    this.state.timeLeft = Math.max(0, this.state.timeLeft - 3);
                    UI.triggerTimerPenalty(); UI.showFloatingText("-3s", "var(--danger)");
                    if(!silent) {
                        AudioEngine.playError();
                        if (greens === 0 && oranges === 0) UI.shakeRow(rowId);
                    }
                    UI.renderHeaderState();
                    if (this.state.timeLeft === 0) this.endGame(false, `竞速结束！连破 ${this.state.speedrunWins} 局`);
                }
                return;
            }

            if (greens === this.config.s) this.endGame(true, "获胜");
            else if (this.state.guesses.length >= this.config.g) this.endGame(false, "步数耗尽！");
            else if (greens === 0 && oranges === 0) { 
                if(!silent) { AudioEngine.playError(); UI.shakeRow(rowId); } 
            }
            else if(!silent) AudioEngine.playClick();
        },

        buyItem(type) {
            let itemCfg = ITEMS_CFG[type];
            let playerRef = this.config.is2P ? (UserData.turn2P === 0 ? UserData.p2 : UserData.p1) : UserData.p1;
            
            if (type === 'audio' && this.state.itemsUsed.audio) {
                UI.showFloatingText("🎵 播放摩斯电码...", "var(--blue)");
                AudioEngine.playMorseCode(this.state.answer);
                return;
            }

            if (playerRef.coins < itemCfg.cost) return alert("金币不足！");
            playerRef.coins -= itemCfg.cost; this.state.itemsUsed[type] = true; UserData.save();

            if (type === 'time') this.state.timeLeft += itemCfg.val;
            else if (type === 'guess') this.config.g += itemCfg.val;
            else if (type === 'hint') {
                let av =[];
                for(let i=0; i<this.config.c; i++) {
                    if (!this.state.answer.includes(i) && !this.state.disabledColors.includes(i)) av.push(i);
                }
                if (av.length > 0) {
                    this.state.disabledColors.push(av[Math.floor(Math.random()*av.length)]);
                    UI.renderKeyboard();
                }
            } else if (type === 'ai') {
                UI.showModal(`<h2>正在运行算法</h2><p style="text-align:center; color:var(--text-muted)">系统正在运行算法进行搜索，请稍后...</p>`);
                setTimeout(() => {
                    const bestGuess = AI.findBestGuess(this.state.guesses, this.config);
                    if (bestGuess) {
                        UI.closeModal();
                        UI.highlightHint(bestGuess);
                    } else {
                        alert("算法未能找到最优解，可能是局面已明朗。");
                        UI.closeModal();
                    }
                }, 100);
            } else if (type === 'audio') {
                UI.showFloatingText("播放摩斯电码...", "var(--blue)");
                AudioEngine.playMorseCode(this.state.answer);
            }
            
            UI.renderHeaderState(); 
            if (type !== 'ai' && type !== 'audio') AudioEngine.playSuccess(); 
            UI.openStore();
        },

        cheatClick() {
            if(!this.state.active) return;
            this.state.cheatClicks++;
            if(this.state.cheatClicks >= 5) {
                alert("恭喜您发现了隐藏模式，答案就在某处...");
                console.log(this.state.answer);
            }
        },

        endGame(isWin, title) {
            this.state.active = false;
            clearInterval(this.state.timerId);
            
            let earned = 0;
            const didWin = isWin;

            if(this.state.cheatClicks < 5 && this.config.mode !== 'speedrun') {
                let baseGold = (this.config.s * this.config.c) * 10;
                let isInfinite = this.config.g >= INFINITE_GUESSES;
                let stepMulti = isInfinite ? 1 : Math.max(1, 1 + (this.config.g - this.state.guesses.length) * 0.1);
                
                earned = didWin ? Math.floor(baseGold * stepMulti) : 0;
                
                if (didWin) {
                    let totalPenalty = 0;
                    for (let type in ITEMS_CFG) {
                        if (this.state.itemsUsed[type]) totalPenalty += ITEMS_CFG[type].penalty;
                    }
                    totalPenalty = Math.min(totalPenalty, 1.0); 
                    earned = Math.max(0, Math.floor(earned * (1 - totalPenalty)));
                }
            }
            
            if(this.config.is2P) {
                let guesserKey = UserData.turn2P === 0 ? 'p2' : 'p1';
                let setterKey = UserData.turn2P === 0 ? 'p1' : 'p2';

                if(didWin) { 
                    UserData[guesserKey].wins++; UserData[guesserKey].coins += earned; 
                } else { 
                    UserData[setterKey].wins++; UserData[setterKey].coins += 50; 
                    earned = 0;
                }
                UserData.p1.played++; UserData.p2.played++;
                UserData.turn2P = 1 - UserData.turn2P; 
            } else {
                UserData.p1.played++;
                if (didWin) {
                    UserData.p1.wins++; UserData.p1.streak++;
                    if(UserData.p1.streak > UserData.p1.maxStreak) UserData.p1.maxStreak = UserData.p1.streak;
                    let step = Math.min(this.state.guesses.length, 20); UserData.p1.history[step-1]++;
                    
                    if (this.config.mode === 'classic' && this.config.classicLevel === UserData.p1.classicLevel) {
                        UserData.p1.classicLevel++;
                        this.config.classicLevel = UserData.p1.classicLevel;
                    }
                    if (this.config.mode === 'daily') UserData.dailyPlayed = new Date().toISOString().slice(0,10);
                } else {
                    UserData.p1.streak = 0;
                }
                UserData.p1.coins += earned;
            }

            if(this.config.mode === 'speedrun') {
                if(this.state.speedrunWins > UserData.p1.bestSpeedrunScore) {
                    UserData.p1.bestSpeedrunScore = this.state.speedrunWins;
                    title = `新纪录！${title}`;
                }
            }

            UserData.save(); 
            App.updateHomeUI();

            if (didWin) { AudioEngine.playSuccess(); startFireworks(); } else AudioEngine.playLose();
            
            setTimeout(() => {
                if(didWin && !this.state.itemsUsed.audio) AudioEngine.playMorseCode(this.state.answer);
                UI.showResultModal(didWin, title, earned);
            }, 800);
        }
    };

    // --- UI 渲染总管 ---
    const UI = {
        showHome() {

        renderHeaderState() {
            let timerEl = document.getElementById('ui-timer');
            if (Game.config.t > 0 || Game.config.mode === 'speedrun') {
                let m = Math.floor(Game.state.timeLeft / 60).toString().padStart(2, '0');
                let s = (Game.state.timeLeft % 60).toString().padStart(2, '0');
                timerEl.innerText = `⏱ ${m}:${s}`;
            } else timerEl.innerText = `⏱ ∞`;

            let left = Game.config.g >= INFINITE_GUESSES ? '∞' : (Game.config.g - Game.state.guesses.length);
            document.getElementById('ui-guesses').innerText = `👟 ${left}`;
        },

        renderBoard() {
            const container = document.getElementById('guess-container'); container.innerHTML = '';
            
            Game.state.guesses.forEach((g, idx) => {
                let row = `<div class="guess-card" id="history-row-${idx}"><span style="display:inline-block"><span class="container-color-block">`;
                for (let i = 0; i < Game.config.s; i++) row += `<span class="color-block" style="background-color: ${COLORS[g.colors[i]]}"></span>`;
                row += `</span>`;
                
                if (Game.config.hintType === 'easy') {
                    row += `<span class="container-color-block" style="margin-top:5px">`;
                    for (let i = 0; i < Game.config.s; i++) {
                        let c = g.posDetail[i] === 1 ? '#00AA00' : (g.posDetail[i] === 2 ? '#FFAA00' : 'var(--empty-bg)');
                        row += `<span class="color-under" style="background-color: ${c}"></span>`;
                    }
                    row += `</span>`;
                }
                row += `</span>`;

                if (Game.config.hintType === 'hard') {
                    row += `<span style="display:flex; flex-wrap:wrap; width:20px; align-content:center; justify-content:center; margin-left:10px;">`;
                    let cG = g.greens, cO = g.oranges;
                    for (let i = 0; i < Game.config.s; i++) {
                        let dc = 'var(--empty-bg)';
                        if (cG > 0) { dc = '#00AA00'; cG--; } else if (cO > 0) { dc = '#FFAA00'; cO--; }
                        row += `<span class="color-dot" style="background-color: ${dc}"></span>`;
                    }
                    row += `</span>`;
                }
                row += `</div>`; container.innerHTML += row;
            });

            if (Game.state.active) {
                let row = `<div class="guess-card guess-card-current" id="current-row"><span style="display:inline-block"><span class="container-color-block">`;
                for (let i = 0; i < Game.config.s; i++) {
                    let color = Game.state.currentInput[i] !== undefined ? COLORS[Game.state.currentInput[i]] : 'var(--empty-bg)';
                    let isLast = i === Game.state.currentInput.length - 1;
                    row += `<span class="color-block ${isLast?'anim-pop':''}" style="background-color: ${color}"></span>`;
                }
                row += `</span>`;
                
                if (Game.config.hintType === 'easy') {
                    row += `<span class="container-color-block" style="margin-top:5px">`;
                    for (let i = 0; i < Game.config.s; i++) row += `<span class="color-under"></span>`;
                    row += `</span>`;
                }
                row += `</span>`;

                if (Game.config.hintType === 'hard') {
                    row += `<span style="display:flex; flex-wrap:wrap; width:20px; align-content:center; justify-content:center; margin-left:10px;">`;
                    for (let i = 0; i < Game.config.s; i++) row += `<span class="color-dot"></span>`;
                    row += `</span>`;
                }
                row += `</div>`; container.innerHTML += row;
                setTimeout(()=> container.scrollTo({top: container.scrollHeight, behavior: 'smooth'}), 50);

            App.vsCfg = cfg;

                let h = `<div class="guess-card guess-card-current" style="margin-bottom:20px;"><span class="container-color-block">`;
                for(let i=0; i<cfg.s; i++) {
                    let c = vsArr[i]!==undefined ? COLORS[vsArr[i]] : 'var(--empty-bg)';

                }
                document.getElementById('vs-board').innerHTML = h + `</span></div>`;
            };

                if(vsArr.length < cfg.s) { 
                    if(!cfg.repeat && vsArr.includes(idx)) return; 
                    AudioEngine.playClick();
                    vsArr.push(idx); renderVS(); 
                } 
            };
            
            window.vsBk = () => { 
                if(vsArr.length > 0) { 
                    AudioEngine.playBackspace();
                    vsArr.pop(); renderVS(); 
                } 
            };

            window.vsStartGuessing = () => {
                App.vsSetupActive = false;
                UI.closeModal();
                Game.start(cfg, [...vsArr]);
            };

                    let handoverHtml = `

                        <div style="text-align:center; padding: 25px 10px 10px 10px;">
                            <div style="font-size: 60px; margin-bottom: 15px; animation: pop 1s infinite alternate;">📱</div>
                            <p style="font-size:18px; font-weight:bold; color:var(--danger); margin-bottom: 5px;">答案已成功设置！</p>
                            <p style="font-size:14px; color:var(--text-muted); margin-bottom: 25px;">
                                请 ${setter} 将设备交给 <span style="color:var(--text-color); font-weight:bold;">${guesser}</span>
                            </p>
                            <button class="button-primary" style="padding: 15px; font-size: 18px;" onclick="vsStartGuessing()">
                                我是 ${guesser}，开始游戏
                            </button>
                        </div>
                    `;
                    document.getElementById('modal-content').innerHTML = handoverHtml;
                } 
            };

            let kbHtml = `<div class="keyboard-area">`;
            for(let i=0; i<cfg.c; i++) {
                kbHtml += `<span class="color-block" style="background-color:${COLORS[i]}; cursor:pointer; position:relative;" onclick="vsAdd(${i})"><span class="key-hint">${i+1}</span></span>`;
            }
            kbHtml += `<span class="color-block control-btn" onclick="vsBk()">&larr;</span><span class="color-block control-btn" onclick="vsSub()">&crarr;</span></div>`;

            let html = `
                <h2>${setter} 设置阶段</h2>
                <p style="text-align:center; font-size:14px; color:var(--danger)">请注意遮挡屏幕，不要被 ${guesser} 看到！</p>
                <div style="text-align:center; font-size:12px; color:var(--text-muted); margin-bottom:10px;">
                    ${cfg.repeat ? '允许重复色' : '不允许重复色'}
                </div>
                <div id="vs-board" style="display:flex; justify-content:center;"></div>
                ${kbHtml}
                <div style="text-align:center; margin-top:20px;">
                    <button class="button-std" style="width:100%;" onclick="UI.requestHome()">取消</button>
                </div>
            `;
            this.showModal(html); 
            renderVS();
        },

        async highlightHint(sequence) {
            while(Game.state.currentInput.length > 0) {
                Game.inputBackspace();
            }
            for (const colorIndex of sequence) {
                const keyElement = document.getElementById(`key-${colorIndex}`);
                if (keyElement) {
                    keyElement.classList.add('hint-flash');
                    Game.inputColor(colorIndex);
                    await new Promise(resolve => setTimeout(() => {
                        keyElement.classList.remove('hint-flash');
                        resolve();
                    }, 400));
                }
            }
        },
    };

    window.onload = () => App.init();
</script>
</body>
</html>
